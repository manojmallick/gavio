name: Release Java (manual)

# Manually publish the gavio-java artifacts to Maven Central from the default
# branch. Use this to (re)publish Java independently of the tag-triggered full
# release (e.g. after fixing signing/namespace) without touching PyPI or npm.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish-java:
    name: Publish → Maven Central
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
          server-id: central
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE

      - name: Already on Maven Central?
        id: check
        working-directory: packages/gavio-java
        run: |
          VER=$(mvn -q -DforceStdout help:evaluate -Dexpression=project.version)
          URL="https://repo1.maven.org/maven2/io/github/manojmallick/gavio-core/$VER/gavio-core-$VER.pom"
          CODE=$(curl -s -o /dev/null -w "%{http_code}" "$URL")
          if [ "$CODE" = "200" ]; then
            echo "already=true" >> "$GITHUB_OUTPUT"; echo "gavio-core $VER already on Central — skipping deploy"
          else
            echo "already=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy (test + sign + publish)
        if: steps.check.outputs.already != 'true'
        working-directory: packages/gavio-java
        run: mvn -B -Prelease deploy
        env:
          MAVEN_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
