name: Release (PyPI + Maven Central + npm)

# Push a version tag (e.g. v0.1.0) to publish all three SDKs in lockstep.
# Each job:
#   1. gates on its own tests,
#   2. verifies the manifest version matches the tag,
#   3. checks the target registry and SKIPS publish if that version already
#      exists (so a re-run after a partial failure is safe — no duplicate error),
#   4. publishes.
# A single GitHub Release is created at the end.
#
# Required repository secrets:
#   PYPI_TOKEN               PyPI API token (starts with "pypi-")
#   MAVEN_CENTRAL_USERNAME   Sonatype Central Portal token username
#   MAVEN_CENTRAL_PASSWORD   Sonatype Central Portal token password
#   GPG_PRIVATE_KEY          ASCII-armored GPG private key (for signing jars)
#   GPG_PASSPHRASE           passphrase for that GPG key
#   NPM_TOKEN                npm automation token
# See RELEASING.md for how to obtain each.

on:
  push:
    tags:
      - 'v[0-9]*'

permissions:
  contents: write   # create the GitHub Release
  id-token: write   # PyPI + npm provenance (OIDC)

jobs:
  stable-release-gate:
    name: Stable release gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Validate release tag readiness
        run: python3 scripts/stable_release_gate.py --tag "$GITHUB_REF_NAME"

  # ── Python → PyPI ─────────────────────────────────────────────────────────
  publish-python:
    name: Publish → PyPI
    needs: [stable-release-gate]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install, lint, test
        working-directory: packages/gavio-py
        run: |
          pip install -e ".[dev]"
          ruff check gavio tests
          pytest tests/unit -q

      - name: Verify version matches tag
        working-directory: packages/gavio-py
        run: |
          PKG="v$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml","rb"))["project"]["version"])')"
          if [ "$PKG" != "$GITHUB_REF_NAME" ]; then
            echo "ERROR: pyproject version ($PKG) != tag ($GITHUB_REF_NAME)"; exit 1
          fi
          echo "✓ $PKG"

      - name: Already on PyPI?
        id: check
        working-directory: packages/gavio-py
        run: |
          VER=$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml","rb"))["project"]["version"])')
          CODE=$(curl -s -o /dev/null -w "%{http_code}" "https://pypi.org/pypi/gavio/$VER/json")
          if [ "$CODE" = "200" ]; then
            echo "already=true" >> "$GITHUB_OUTPUT"; echo "gavio $VER already on PyPI — skipping publish"
          else
            echo "already=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build sdist + wheel
        if: steps.check.outputs.already != 'true'
        working-directory: packages/gavio-py
        run: |
          pip install build
          python -m build

      - name: Publish to PyPI
        if: steps.check.outputs.already != 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: packages/gavio-py/dist
          password: ${{ secrets.PYPI_TOKEN }}
          skip-existing: true   # belt-and-suspenders idempotency

  # ── Java → Maven Central ──────────────────────────────────────────────────
  publish-java:
    name: Publish → Maven Central
    needs: [stable-release-gate]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven
          server-id: central                       # matches publishingServerId in pom
          server-username: MAVEN_USERNAME           # env var read from settings.xml
          server-password: MAVEN_PASSWORD
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE      # env var maven-gpg-plugin reads

      - name: Verify version matches tag
        working-directory: packages/gavio-java
        run: |
          PKG="v$(mvn -q -DforceStdout help:evaluate -Dexpression=project.version)"
          if [ "$PKG" != "$GITHUB_REF_NAME" ]; then
            echo "ERROR: pom version ($PKG) != tag ($GITHUB_REF_NAME)"; exit 1
          fi
          echo "✓ $PKG"

      - name: Already on Maven Central?
        id: check
        working-directory: packages/gavio-java
        run: |
          VER=$(mvn -q -DforceStdout help:evaluate -Dexpression=project.version)
          URL="https://repo1.maven.org/maven2/io/github/manojmallick/gavio-core/$VER/gavio-core-$VER.pom"
          CODE=$(curl -s -o /dev/null -w "%{http_code}" "$URL")
          if [ "$CODE" = "200" ]; then
            echo "already=true" >> "$GITHUB_OUTPUT"; echo "gavio-core $VER already on Central — skipping deploy"
          else
            echo "already=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy (test + sign + publish)
        if: steps.check.outputs.already != 'true'
        working-directory: packages/gavio-java
        run: mvn -B -Prelease deploy
        env:
          MAVEN_USERNAME: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

  # ── JavaScript → npm ──────────────────────────────────────────────────────
  publish-npm:
    name: Publish → npmjs.com
    needs: [stable-release-gate]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Install, typecheck, test
        working-directory: packages/gavio-js
        run: |
          npm ci
          npm run typecheck
          npm test

      - name: Verify version matches tag
        working-directory: packages/gavio-js
        run: |
          PKG="v$(node -p "require('./package.json').version")"
          if [ "$PKG" != "$GITHUB_REF_NAME" ]; then
            echo "ERROR: package.json version ($PKG) != tag ($GITHUB_REF_NAME)"; exit 1
          fi
          echo "✓ $PKG"

      - name: Already on npm?
        id: check
        working-directory: packages/gavio-js
        run: |
          VER=$(node -p "require('./package.json').version")
          if npm view "gavio@$VER" version >/dev/null 2>&1; then
            echo "already=true" >> "$GITHUB_OUTPUT"; echo "gavio@$VER already on npm — skipping publish"
          else
            echo "already=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm
        if: steps.check.outputs.already != 'true'
        working-directory: packages/gavio-js
        run: npm publish --provenance --access public   # prepublishOnly builds dist/
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  # ── GitHub Release (once, after all three publish) ────────────────────────
  github-release:
    name: Create GitHub Release
    needs: [publish-python, publish-java, publish-npm]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          make_latest: true
