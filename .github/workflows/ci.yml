name: CI

# Test all three SDKs on every push and PR. Each job also runs the shared
# cross-SDK test vectors in //test-vectors, so a parity regression in any one
# language fails CI.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  stable-release-gate:
    name: Stable release gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Validate release readiness
        run: python3 scripts/stable_release_gate.py

  python:
    name: Python SDK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/gavio-py
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    services:
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: pip install -e ".[dev,redis]"
      - name: Lint (ruff)
        run: ruff check gavio tests
      - name: Test (pytest, incl. shared vectors + Redis backend, F-CACHE-04)
        run: pytest tests/unit -q

  javascript:
    name: JavaScript SDK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/gavio-js
    strategy:
      matrix:
        node-version: ["18", "20", "22"]
    services:
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - name: Install
        run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Test (vitest, incl. shared vectors + Redis backend, F-CACHE-04)
        run: npm test

  java:
    name: Java SDK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/gavio-java
    strategy:
      matrix:
        java-version: ["17", "21"]
    services:
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java-version }}
          cache: maven
      - name: Test (maven, incl. shared vectors + Redis backend, F-CACHE-04)
        run: mvn -B test

  benchmarks:
    name: Inspector overhead benchmarks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven
      - name: Python harness (thresholds enforced, INSPECTOR_PLAN §13)
        run: python3 benchmarks/inspector/bench.py
      - name: Build JS SDK
        working-directory: packages/gavio-js
        run: npm ci && npm run build
      - name: JavaScript harness
        run: node benchmarks/inspector/bench.mjs
      - name: Java harness
        working-directory: packages/gavio-java
        run: mvn -B -q -pl gavio-core test -Dtest=InspectorOverheadBench
