name: CI

# Test all three SDKs on every push and PR. Each job also runs the shared
# cross-SDK test vectors in //test-vectors, so a parity regression in any one
# language fails CI.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python:
    name: Python SDK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/gavio-py
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: pip install -e ".[dev]"
      - name: Lint (ruff)
        run: ruff check gavio tests
      - name: Test (pytest, incl. shared vectors)
        run: pytest tests/unit -q

  javascript:
    name: JavaScript SDK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/gavio-js
    strategy:
      matrix:
        node-version: ["18", "20", "22"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - name: Install
        run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Test (vitest, incl. shared vectors)
        run: npm test

  java:
    name: Java SDK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/gavio-java
    strategy:
      matrix:
        java-version: ["17", "21"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ matrix.java-version }}
          cache: maven
      - name: Test (maven, incl. shared vectors)
        run: mvn -B test
