name: Release npm (manual)

# Manually publish the gavio-js package to npm from the default branch.
# Use this to (re)publish npm independently of the tag-triggered full release
# (e.g. after a provenance/package.json fix) without touching PyPI or Maven.

on:
  workflow_dispatch:
    inputs:
      provenance:
        description: 'Attach build provenance'
        type: boolean
        default: true

permissions:
  contents: read
  id-token: write   # npm provenance (OIDC)

jobs:
  publish-npm:
    name: Publish → npmjs.com
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'

      - name: Install, typecheck, test
        working-directory: packages/gavio-js
        run: |
          npm ci
          npm run typecheck
          npm test

      - name: Already on npm?
        id: check
        working-directory: packages/gavio-js
        run: |
          VER=$(node -p "require('./package.json').version")
          if npm view "gavio@$VER" version >/dev/null 2>&1; then
            echo "already=true" >> "$GITHUB_OUTPUT"; echo "gavio@$VER already on npm — skipping publish"
          else
            echo "already=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm
        if: steps.check.outputs.already != 'true'
        working-directory: packages/gavio-js
        run: |
          if [ "${{ inputs.provenance }}" = "true" ]; then
            npm publish --provenance --access public
          else
            npm publish --access public
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
