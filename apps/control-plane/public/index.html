<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Gavio Control Plane</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div>
        <p class="eyebrow">Gavio</p>
        <h1>Control Plane</h1>
      </div>
      <div class="topbar-actions">
        <span id="status" class="status">checking</span>
        <button id="demo" type="button" hidden>Seed demo</button>
        <button id="refresh" type="button">Refresh</button>
      </div>
    </header>
    <div class="shell">
      <nav id="nav" class="nav" aria-label="Control plane views"></nav>
      <main id="app" class="workspace" tabindex="-1"></main>
    </div>
    <div id="toast" class="toast" role="status" aria-live="polite" hidden></div>
    <script src="/app.js" type="module"></script>
  </body>
</html>
