<!doctype html>
<!--
  Gavio Inspector UI (F-DX-10) — single self-contained file, no external
  resources (works fully offline). Served at "/" by the embedded inspector
  server in each SDK; talks to the JSON API under /api.

  Source of truth: inspector-ui/index.html in the monorepo. Vendored copies:
    packages/gavio-py/gavio/inspector/ui.html
    packages/gavio-java/gavio-core/src/main/resources/io/gavio/inspector/ui.html
    packages/gavio-js/src/inspector/ui.html
  Edit here, then re-copy to all three (kept in sync by tests/CI checksum).
-->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Gavio Inspector</title>
<style>
  :root {
    --bg: #0d1117; --panel: #161b22; --panel2: #1c2129; --border: #30363d;
    --fg: #e6edf3; --dim: #8b949e; --accent: #58a6ff; --ok: #3fb950;
    --err: #f85149; --warn: #d29922; --pii: #bc8cff; --cache: #39c5cf;
    --mono: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  }
  * { box-sizing: border-box; margin: 0; }
  body { background: var(--bg); color: var(--fg); font: 13px/1.5 -apple-system, "Segoe UI", Roboto, sans-serif; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
  header { display: flex; align-items: center; gap: 12px; padding: 8px 16px; background: var(--panel); border-bottom: 1px solid var(--border); flex: none; }
  header h1 { font-size: 15px; font-weight: 600; }
  header h1 span { color: var(--accent); }
  .badge { font: 11px var(--mono); padding: 1px 8px; border-radius: 10px; border: 1px solid var(--border); color: var(--dim); }
  .badge.mode-full { color: var(--warn); border-color: var(--warn); }
  .badge.mode-redacted { color: var(--cache); border-color: var(--cache); }
  .badge.mode-metadata { color: var(--ok); border-color: var(--ok); }
  #conn { width: 8px; height: 8px; border-radius: 50%; background: var(--err); }
  #conn.live { background: var(--ok); }
  nav { margin-left: auto; display: flex; gap: 4px; }
  nav button { background: none; border: 1px solid transparent; color: var(--dim); padding: 4px 12px; border-radius: 6px; cursor: pointer; font-size: 13px; }
  nav button.active { color: var(--fg); background: var(--panel2); border-color: var(--border); }
  main { flex: 1; display: flex; min-height: 0; }
  /* trace list */
  #list { width: 42%; min-width: 380px; border-right: 1px solid var(--border); display: flex; flex-direction: column; }
  #filters { display: flex; gap: 6px; padding: 8px; border-bottom: 1px solid var(--border); flex: none; }
  #filters input, #filters select { background: var(--panel2); border: 1px solid var(--border); color: var(--fg); border-radius: 6px; padding: 4px 8px; font-size: 12px; }
  #filters input { flex: 1; }
  #rows { overflow-y: auto; flex: 1; }
  .row { display: grid; grid-template-columns: 70px 1fr auto; gap: 4px 10px; padding: 7px 12px; border-bottom: 1px solid var(--border); cursor: pointer; }
  .row:hover { background: var(--panel); }
  .row.sel { background: var(--panel2); box-shadow: inset 3px 0 0 var(--accent); }
  .row .time { color: var(--dim); font: 11px var(--mono); }
  .row .who { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .row .who small { color: var(--dim); }
  .tags { display: flex; gap: 4px; justify-content: flex-end; }
  .tag { font: 10px var(--mono); padding: 0 6px; border-radius: 8px; }
  .tag.ok { background: #1a3020; color: var(--ok); }
  .tag.error, .tag.blocked { background: #3a1518; color: var(--err); }
  .tag.pii { background: #2a1f3d; color: var(--pii); }
  .tag.cache { background: #11333a; color: var(--cache); }
  .tag.ms { color: var(--dim); }
  #empty { color: var(--dim); text-align: center; padding: 40px 20px; }
  /* detail */
  #detail { flex: 1; overflow-y: auto; padding: 14px 18px; }
  #detail h2 { font-size: 13px; color: var(--dim); text-transform: uppercase; letter-spacing: .06em; margin: 18px 0 8px; }
  #detail h2:first-child { margin-top: 0; }
  .kv { display: grid; grid-template-columns: 140px 1fr; gap: 2px 12px; font: 12px var(--mono); }
  .kv dt { color: var(--dim); }
  .kv dd { word-break: break-all; }
  /* waterfall */
  .span { display: grid; grid-template-columns: 170px 1fr 70px; gap: 10px; align-items: center; padding: 3px 0; cursor: pointer; border-radius: 4px; }
  .span:hover { background: var(--panel); }
  .span .nm { font: 11px var(--mono); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .span .bar-lane { position: relative; height: 12px; background: var(--panel); border-radius: 3px; }
  .span .bar { position: absolute; top: 0; height: 100%; border-radius: 3px; background: var(--accent); min-width: 2px; }
  .span .bar.provider { background: var(--ok); }
  .span .bar.after { background: var(--pii); }
  .span .dur { text-align: right; font: 11px var(--mono); color: var(--dim); }
  .span.sel { background: var(--panel2); }
  /* panes */
  pre { background: var(--panel); border: 1px solid var(--border); border-radius: 6px; padding: 10px; font: 12px var(--mono); overflow-x: auto; white-space: pre-wrap; word-break: break-word; }
  .diffgrid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .diffgrid h3 { font-size: 11px; color: var(--dim); margin-bottom: 4px; }
  mark.del { background: #4b1113; color: #ffb3b8; border-radius: 3px; padding: 0 1px; }
  mark.ins { background: #1a3d24; color: #a5e8b4; border-radius: 3px; padding: 0 1px; }
  .lint { display: flex; gap: 8px; padding: 8px 10px; border: 1px solid var(--warn); border-radius: 6px; margin-bottom: 8px; color: var(--warn); }
  .chainbox { display: flex; flex-direction: column; gap: 0; margin-top: 8px; }
  .chip { border: 1px solid var(--border); background: var(--panel); border-radius: 8px; padding: 8px 12px; margin: 4px 0; }
  .chip b { font: 12px var(--mono); }
  .chip .cfg { color: var(--dim); font: 11px var(--mono); margin-top: 2px; }
  .arrow { color: var(--dim); text-align: center; font-size: 11px; }
  #pipeline { flex: 1; overflow-y: auto; padding: 16px 20px; max-width: 720px; }
  .muted { color: var(--dim); }
  /* v0.7.0 views */
  .view { flex: 1; overflow-y: auto; padding: 16px 20px; }
  table.grid { border-collapse: collapse; width: 100%; font: 12px var(--mono); }
  table.grid th, table.grid td { text-align: left; padding: 6px 10px; border-bottom: 1px solid var(--border); }
  table.grid th { color: var(--dim); font-weight: 500; text-transform: uppercase; font-size: 10px; letter-spacing: .06em; }
  table.grid tr.click { cursor: pointer; }
  table.grid tr.click:hover { background: var(--panel); }
  .btn { background: var(--panel2); border: 1px solid var(--border); color: var(--fg); border-radius: 6px; padding: 4px 12px; cursor: pointer; font-size: 12px; }
  .btn:hover { border-color: var(--accent); }
  .btn[disabled] { opacity: .4; cursor: not-allowed; }
  .actions { display: flex; gap: 6px; flex-wrap: wrap; align-items: center; margin-top: 8px; }
  .dagnode { border: 1px solid var(--border); background: var(--panel); border-radius: 8px; padding: 6px 12px; margin: 4px 0; cursor: pointer; display: flex; gap: 10px; align-items: baseline; }
  .dagnode:hover { border-color: var(--accent); }
  .dagnode b { font: 12px var(--mono); }
  .dagnode .roll { color: var(--dim); font: 11px var(--mono); margin-left: auto; }
  .viewbar { display: flex; gap: 8px; align-items: center; margin-bottom: 12px; }
  .viewbar input, .viewbar select { background: var(--panel2); border: 1px solid var(--border); color: var(--fg); border-radius: 6px; padding: 4px 8px; font-size: 12px; }
  #replay-editor { display: none; margin-top: 8px; }
  #replay-editor textarea { width: 100%; min-height: 90px; background: var(--panel); border: 1px solid var(--border); color: var(--fg); border-radius: 6px; padding: 8px; font: 12px var(--mono); }
</style>
</head>
<body>
<header>
  <h1><span>Gavio</span> Inspector</h1>
  <span class="badge" id="mode">…</span>
  <span class="badge" id="target">…</span>
  <div id="conn" title="live stream"></div>
  <nav>
    <button id="tab-traces" class="active">Traces</button>
    <button id="tab-sessions">Sessions</button>
    <button id="tab-dag">DAG</button>
    <button id="tab-stats">Stats</button>
    <button id="tab-pipeline">Pipeline</button>
  </nav>
</header>
<main>
  <section id="list">
    <div id="filters">
      <input id="q" placeholder="filter: agent, model, trace id…">
      <select id="fstatus">
        <option value="">all</option><option>ok</option><option>error</option><option>blocked</option>
      </select>
    </div>
    <div id="rows"><div id="empty">Waiting for traffic…<br><span class="muted">Send a request through the gateway.</span></div></div>
  </section>
  <section id="detail"><div id="empty2" class="muted" style="padding:40px 20px;text-align:center">Select a trace.</div></section>
  <section id="sessions" class="view" style="display:none"></section>
  <section id="dag" class="view" style="display:none"></section>
  <section id="stats" class="view" style="display:none"></section>
  <section id="pipeline" style="display:none"></section>
</main>
<script>
"use strict";
const $ = (s) => document.querySelector(s);
const esc = (s) => String(s).replace(/[&<>"]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));
const api = (p) => fetch(p).then((r) => r.json());

const state = { traces: new Map(), order: [], sel: null, selSpan: null, mode: "?" };

/* ---------- boot ---------- */
async function boot() {
  try {
    const h = await api("/api/health");
    state.mode = h.mode;
    $("#mode").textContent = h.mode;
    $("#mode").className = "badge mode-" + h.mode;
    $("#target").textContent = (h.sdk || "gavio") + " v" + (h.version || "?");
  } catch (e) { /* header stays unknown */ }
  const t = await api("/api/traces?limit=200");
  for (const s of (t.traces || []).slice().reverse()) upsert(s.traceId, { summary: s });
  renderList();
  connect();
  loadPipeline();
}

/* ---------- live stream ---------- */
function connect() {
  const es = new EventSource("/api/stream");
  es.onopen = () => $("#conn").classList.add("live");
  es.onerror = () => $("#conn").classList.remove("live");
  es.onmessage = (m) => {
    let ev; try { ev = JSON.parse(m.data); } catch { return; }
    const tr = upsert(ev.traceId, {});
    tr.events.push(ev);
    if (ev.type === "trace.start") { tr.summary = { ...tr.summary, ...summaryFromStart(ev) }; state.order.unshift(ev.traceId); }
    if (ev.type === "trace.end") tr.summary = { ...tr.summary, ...summaryFromEnd(ev) };
    renderList();
    if (state.sel === ev.traceId) renderDetail();
  };
}
function upsert(id, patch) {
  let tr = state.traces.get(id);
  if (!tr) { tr = { events: [], summary: { traceId: id } }; state.traces.set(id, tr); if (patch.summary) state.order.push(id); }
  if (patch.summary) tr.summary = { ...tr.summary, ...patch.summary };
  return tr;
}
const summaryFromStart = (ev) => ({ traceId: ev.traceId, agentId: ev.data.agentId, sessionId: ev.data.sessionId, provider: ev.data.provider, model: ev.data.model, wallTimeUtc: ev.data.wallTimeUtc, status: "…" });
const summaryFromEnd = (ev) => ({ status: ev.data.status, latencyMs: ev.data.latencyMs, costUsd: ev.data.costUsd, cacheHit: ev.data.cacheHit, cacheType: ev.data.cacheType, piiEntityTypes: ev.data.piiEntityTypes });

/* ---------- trace list ---------- */
function renderList() {
  const q = $("#q").value.toLowerCase(), fs = $("#fstatus").value;
  const rows = [];
  for (const id of state.order) {
    const s = state.traces.get(id)?.summary; if (!s) continue;
    if (fs && s.status !== fs) continue;
    if (q && !((s.agentId || "") + (s.model || "") + id).toLowerCase().includes(q)) continue;
    const time = s.wallTimeUtc ? new Date(s.wallTimeUtc).toLocaleTimeString() : "";
    const tags = [
      `<span class="tag ${esc(s.status || "")}">${esc(s.status || "?")}</span>`,
      s.latencyMs != null ? `<span class="tag ms">${s.latencyMs}ms</span>` : "",
      (s.piiEntityTypes || []).length ? `<span class="tag pii">PII</span>` : "",
      s.cacheHit ? `<span class="tag cache">${esc(s.cacheType || "cache")}</span>` : "",
    ].join("");
    rows.push(`<div class="row ${state.sel === id ? "sel" : ""}" data-id="${esc(id)}">
      <span class="time">${time}</span>
      <span class="who">${esc(s.agentId || "—")} <small>${esc(s.provider || "")}/${esc(s.model || "")}</small></span>
      <span class="tags">${tags}</span></div>`);
  }
  $("#rows").innerHTML = rows.join("") || '<div id="empty">Waiting for traffic…</div>';
  for (const el of document.querySelectorAll(".row")) el.onclick = () => select(el.dataset.id);
}
async function select(id) {
  state.sel = id; state.selSpan = null;
  const tr = state.traces.get(id);
  if (tr && tr.events.length === 0) {
    try { const d = await api("/api/traces/" + encodeURIComponent(id)); tr.events = d.events || []; tr.summary = { ...tr.summary, ...(d.summary || {}) }; } catch {}
  }
  renderList(); renderDetail();
}

/* ---------- detail: waterfall + panes ---------- */
function buildSpans(events) {
  const spans = [], open = {};
  let total = 1;
  for (const ev of events) {
    const d = ev.data || {};
    if (ev.type.endsWith(".start") && ev.type.startsWith("interceptor")) open[ev.type.split(".")[1] + ":" + d.name] = ev;
    if (ev.type === "provider.call.start") open["provider"] = ev;
    if (ev.type.endsWith(".end")) {
      let key, cls, label;
      if (ev.type === "provider.call.end") { key = "provider"; cls = "provider"; label = "provider call"; }
      else { const phase = ev.type.split(".")[1]; key = phase + ":" + d.name; cls = phase === "after" ? "after" : "before"; label = `${d.name} (${phase})`; }
      const st = open[key]; if (!st) continue;
      spans.push({ label, cls, t0: st.tNs, t1: ev.tNs, end: ev });
      total = Math.max(total, ev.tNs);
    }
    if (ev.type === "trace.end") total = Math.max(total, ev.tNs);
  }
  return { spans, total };
}
function renderDetail() {
  const tr = state.sel && state.traces.get(state.sel);
  if (!tr) { $("#detail").innerHTML = '<div class="muted" style="padding:40px;text-align:center">Select a trace.</div>'; return; }
  const s = tr.summary, { spans, total } = buildSpans(tr.events);
  const start = tr.events.find((e) => e.type === "trace.start"), end = tr.events.find((e) => e.type === "trace.end");
  const err = tr.events.find((e) => e.type === "trace.error");
  let html = `<h2>Trace</h2><dl class="kv">
    <dt>trace id</dt><dd>${esc(s.traceId || "")}</dd>
    ${start?.data.parentTraceId ? `<dt>parent</dt><dd>${esc(start.data.parentTraceId)}</dd>` : ""}
    <dt>agent</dt><dd>${esc(s.agentId || "—")}</dd>
    <dt>route</dt><dd>${esc(s.provider || "")}/${esc(s.model || "")}</dd>
    <dt>status</dt><dd>${esc(s.status || "?")} · ${s.latencyMs != null ? s.latencyMs + "ms" : ""} · ${s.costUsd != null ? "$" + Number(s.costUsd).toFixed(6) : ""}</dd>
    ${(s.piiEntityTypes || []).length ? `<dt>pii</dt><dd>${esc(s.piiEntityTypes.join(", "))}</dd>` : ""}
  </dl>`;
  if (err) html += `<h2>Error</h2><pre>${esc(err.data.errorType)} (${esc(err.data.origin)}${err.data.interceptorName ? " · " + esc(err.data.interceptorName) : ""})\n${esc(err.data.message)}</pre>`;
  html += `<h2>Waterfall</h2><div id="wf">` + spans.map((sp, i) => {
    const left = (sp.t0 / total) * 100, w = Math.max(((sp.t1 - sp.t0) / total) * 100, 0.4);
    const us = sp.end.data.durationUs != null ? sp.end.data.durationUs : Math.round((sp.t1 - sp.t0) / 1000);
    return `<div class="span ${state.selSpan === i ? "sel" : ""}" data-i="${i}">
      <span class="nm">${esc(sp.label)}${sp.end.data.mutated ? " ✎" : ""}${sp.end.data.aborted ? " ⛔" : ""}</span>
      <span class="bar-lane"><span class="bar ${sp.cls}" style="left:${left}%;width:${w}%"></span></span>
      <span class="dur">${us >= 1000 ? (us / 1000).toFixed(1) + "ms" : us + "µs"}</span></div>`;
  }).join("") + `</div>`;
  const sp = state.selSpan != null && spans[state.selSpan];
  if (sp) {
    const d = sp.end.data;
    html += `<h2>${esc(sp.label)}</h2>`;
    if (d.aborted) html += `<div class="lint">⛔ aborted: ${esc(d.abortReason || "")}</div>`;
    if (d.diff && d.diff.messages) html += renderDiff(d.diff, start);
    if (d.diff && d.diff.model) html += `<dl class="kv"><dt>model rewrite</dt><dd>${esc(d.diff.model.from || "?")} → ${esc(d.diff.model.to || "?")}</dd></dl>`;
    if (d.decision && Object.keys(d.decision).length) html += `<h2>Decision</h2><pre>${esc(JSON.stringify(d.decision, null, 2))}</pre>`;
    if (!d.diff && (!d.decision || !Object.keys(d.decision).length)) html += `<p class="muted">No mutation, no decision record.</p>`;
  }
  if (start?.data.messages) html += `<h2>Request${state.mode === "redacted" ? " (redacted)" : ""}</h2>` + start.data.messages.map((m) => `<pre><b>${esc(m.role)}</b>  ${esc(m.content)}</pre>`).join("");
  if (end?.data.content != null) html += `<h2>Response</h2><pre>${esc(end.data.content)}</pre>`;
  if (state.mode === "metadata") html += `<p class="muted">metadata mode — content is never captured.</p>`;
  html += renderActions(s);
  $("#detail").innerHTML = html;
  for (const el of document.querySelectorAll(".span")) el.onclick = () => { state.selSpan = +el.dataset.i; renderDetail(); };
  wireActions(s);
}

/* ---------- replay & export (F-DX-11 / F-DX-12) ---------- */
function renderActions(s) {
  let html = `<h2>Actions</h2><div class="actions">`;
  if (state.mode === "full") {
    html += `<button class="btn" id="act-replay">Replay</button><button class="btn" id="act-edit">Edit &amp; resend</button>`;
  } else {
    html += `<button class="btn" disabled title="replay requires full capture mode">Replay</button>`;
  }
  if (state.mode !== "metadata") {
    const base = `/api/traces/${encodeURIComponent(s.traceId)}/export?format=`;
    for (const f of ["test-vector", "testkit-py", "testkit-js", "testkit-java"]) {
      html += `<a class="btn" href="${base}${f}" download>${f}</a>`;
    }
  } else {
    html += `<span class="muted">export requires full or redacted mode</span>`;
  }
  html += `</div><div id="replay-editor">
    <textarea id="replay-messages"></textarea>
    <div class="actions"><input id="replay-model" placeholder="model override (optional)">
    <button class="btn" id="act-resend">Send</button></div></div>`;
  return html;
}
function wireActions(s) {
  const replay = (overrides) =>
    fetch("/api/replay", { method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ traceId: s.traceId, overrides }) })
      .then((r) => r.json())
      .then((d) => { if (d.traceId) { showTab("traces"); select(d.traceId); } else alert(d.error || "replay failed"); })
      .catch((e) => alert("replay failed: " + e));
  const btn = $("#act-replay"); if (btn) btn.onclick = () => replay(undefined);
  const edit = $("#act-edit");
  if (edit) edit.onclick = () => {
    const tr = state.traces.get(s.traceId);
    const start = tr?.events.find((e) => e.type === "trace.start");
    $("#replay-messages").value = JSON.stringify(start?.data.messages || [], null, 2);
    $("#replay-editor").style.display = "block";
  };
  const resend = $("#act-resend");
  if (resend) resend.onclick = () => {
    let messages;
    try { messages = JSON.parse($("#replay-messages").value); } catch { alert("messages must be valid JSON"); return; }
    const overrides = { messages };
    if ($("#replay-model").value) overrides.model = $("#replay-model").value;
    replay(overrides);
  };
}

/* ---------- sessions view (F-OBS-10) ---------- */
async function loadSessions() {
  let d; try { d = await api("/api/sessions"); } catch { return; }
  const sessions = d.sessions || [];
  if (!sessions.length) { $("#sessions").innerHTML = '<p class="muted">No sessions yet — pass session_id on your gateway calls.</p>'; return; }
  $("#sessions").innerHTML = `<h2 style="margin-bottom:10px">Sessions</h2><table class="grid"><tr>
    <th>session</th><th>traces</th><th>errors</th><th>agents</th><th>cost</th><th>latency</th><th>first</th><th>last</th></tr>` +
    sessions.map((s) => `<tr class="click" data-sid="${esc(s.sessionId)}">
      <td>${esc(s.sessionId)}</td><td>${s.traces}</td><td>${s.errors}</td>
      <td>${esc((s.agents || []).join(", "))}</td>
      <td>$${Number(s.totalCostUsd || 0).toFixed(6)}</td><td>${s.totalLatencyMs}ms</td>
      <td>${s.firstWallTimeUtc ? new Date(s.firstWallTimeUtc).toLocaleTimeString() : ""}</td>
      <td>${s.lastWallTimeUtc ? new Date(s.lastWallTimeUtc).toLocaleTimeString() : ""}</td></tr>`).join("") + `</table>`;
  for (const el of document.querySelectorAll("#sessions tr.click"))
    el.onclick = () => { state.dagQuery = "session:" + el.dataset.sid; showTab("dag"); };
}

/* ---------- DAG view (F-OBS-10) ---------- */
async function loadDag() {
  const bar = `<div class="viewbar"><input id="dag-query" placeholder="session:<id> or root trace id" value="${esc(state.dagQuery || "")}">
    <button class="btn" id="dag-go">Load</button></div>`;
  const q = state.dagQuery;
  let body = '<p class="muted">Enter a session id (session:&lt;id&gt;) or a root trace id.</p>';
  if (q) {
    const url = q.startsWith("session:")
      ? "/api/dag?session_id=" + encodeURIComponent(q.slice(8))
      : "/api/dag?root=" + encodeURIComponent(q);
    try {
      const d = await api(url);
      if (d.error) body = `<p class="muted">${esc(d.error)}</p>`;
      else body = renderDagTree(d);
    } catch { body = '<p class="muted">DAG unavailable.</p>'; }
  }
  $("#dag").innerHTML = `<h2 style="margin-bottom:10px">Agent call graph</h2>` + bar + body;
  const input = $("#dag-query");
  if (state.dagQuery) input.value = state.dagQuery;
  $("#dag-go").onclick = () => { state.dagQuery = input.value.trim(); loadDag(); };
  input.onkeydown = (e) => { if (e.key === "Enter") { state.dagQuery = input.value.trim(); loadDag(); } };
  for (const el of document.querySelectorAll(".dagnode"))
    el.onclick = () => { showTab("traces"); select(el.dataset.id); };
}
function renderDagTree(dag) {
  const nodes = new Map((dag.nodes || []).map((n) => [n.traceId, n]));
  const children = {};
  for (const e of dag.edges || []) (children[e.from] = children[e.from] || []).push(e.to);
  const roots = (dag.nodes || []).filter((n) => !n.parentTraceId || !nodes.has(n.parentTraceId));
  const renderNode = (n, depth) => {
    const roll = n.subtree || {};
    return `<div class="dagnode" data-id="${esc(n.traceId)}" style="margin-left:${depth * 26}px">
      <b>${esc(n.agentId || "—")}</b><span class="muted">${esc(n.provider || "")}/${esc(n.model || "")}</span>
      <span class="tag ${esc(n.status || "")}">${esc(n.status || "?")}</span>
      <span class="roll">subtree: ${roll.traces || 1} traces · $${Number(roll.costUsd || 0).toFixed(6)} · ${roll.latencyMs || 0}ms${roll.errors ? " · " + roll.errors + " err" : ""}</span></div>` +
      (children[n.traceId] || []).map((id) => nodes.has(id) ? renderNode(nodes.get(id), depth + 1) : "").join("");
  };
  if (!roots.length) return '<p class="muted">No traces matched.</p>';
  return roots.map((n) => renderNode(n, 0)).join("");
}

/* ---------- stats view (F-DX-08) ---------- */
async function loadStats() {
  const groupBy = state.statsGroup || "";
  let d; try { d = await api("/api/stats" + (groupBy ? "?group_by=" + groupBy : "")); } catch { return; }
  const agg = (a) => a ? `<td>${a.requests}</td><td>${a.errors} (${(a.errorRate * 100).toFixed(1)}%)</td>
    <td>${a.latencyMs.p50 ?? "—"} / ${a.latencyMs.p95 ?? "—"} / ${a.latencyMs.p99 ?? "—"}</td>
    <td>${a.tokens.total}</td><td>$${Number(a.costUsd).toFixed(6)}</td>
    <td>${a.cacheHits} (${(a.cacheHitRate * 100).toFixed(1)}%)</td>
    <td>${esc(Object.entries(a.piiDetections || {}).map(([k, v]) => k + ":" + v).join(" ") || "—")}</td>` : "";
  let html = `<h2 style="margin-bottom:10px">Stats</h2>
    <div class="viewbar"><label class="muted">group by</label><select id="stats-group">
      <option value="">—</option>
      ${["provider", "model", "agent_id"].map((g) => `<option ${g === groupBy ? "selected" : ""}>${g}</option>`).join("")}
    </select></div>
    <table class="grid"><tr><th></th><th>requests</th><th>errors</th><th>latency p50/p95/p99 (ms)</th><th>tokens</th><th>cost</th><th>cache</th><th>pii</th></tr>
    <tr><td><b>total</b></td>${agg(d.total)}</tr>` +
    Object.entries(d.groups || {}).map(([k, a]) => `<tr><td>${esc(k)}</td>${agg(a)}</tr>`).join("") + `</table>`;
  $("#stats").innerHTML = html;
  $("#stats-group").onchange = (e) => { state.statsGroup = e.target.value; loadStats(); };
}

/* word-level diff highlight (LCS on tokens) */
function wordDiff(a, b) {
  const A = a.split(/(\s+)/), B = b.split(/(\s+)/);
  const n = A.length, m = B.length, L = Array.from({ length: n + 1 }, () => new Array(m + 1).fill(0));
  for (let i = n - 1; i >= 0; i--) for (let j = m - 1; j >= 0; j--) L[i][j] = A[i] === B[j] ? L[i + 1][j + 1] + 1 : Math.max(L[i + 1][j], L[i][j + 1]);
  let i = 0, j = 0; const da = [], db = [];
  while (i < n && j < m) {
    if (A[i] === B[j]) { da.push(esc(A[i])); db.push(esc(B[j])); i++; j++; }
    else if (L[i + 1][j] >= L[i][j + 1]) { da.push(`<mark class="del">${esc(A[i++])}</mark>`); }
    else { db.push(`<mark class="ins">${esc(B[j++])}</mark>`); }
  }
  while (i < n) da.push(`<mark class="del">${esc(A[i++])}</mark>`);
  while (j < m) db.push(`<mark class="ins">${esc(B[j++])}</mark>`);
  return [da.join(""), db.join("")];
}
function renderDiff(diff, start) {
  let out = "<h2>Mutation diff</h2>";
  for (const ch of diff.messages) {
    const to = ch.to != null ? ch.to : "";
    if (ch.from != null) {
      const [ha, hb] = wordDiff(ch.from, to);
      out += `<div class="diffgrid"><div><h3>original (message ${ch.index})</h3><pre>${ha}</pre></div><div><h3>after</h3><pre>${hb}</pre></div></div>`;
    } else {
      out += `<div><h3 class="muted">message ${ch.index} — post-mutation only (${esc(state.mode)} mode)</h3><pre>${esc(to)}</pre></div>`;
    }
  }
  return out;
}

/* ---------- pipeline view ---------- */
async function loadPipeline() {
  let p; try { p = await api("/api/pipeline"); } catch { return; }
  let html = `<h2 style="margin-bottom:10px">Pipeline</h2><dl class="kv">
    <dt>provider</dt><dd>${esc(p.provider || "?")}</dd><dt>model</dt><dd>${esc(p.model || "?")}</dd>
    <dt>dev mode</dt><dd>${p.devMode ? "on" : "off"}</dd><dt>dry run</dt><dd>${p.dryRun ? "on" : "off"}</dd></dl>`;
  for (const l of p.lints || []) html += `<div class="lint">⚠ ${esc(l.message)}</div>`;
  html += `<div class="chainbox"><div class="arrow">request ↓</div>`;
  for (const it of p.interceptors || []) {
    html += `<div class="chip"><b>${esc(it.name)}</b>${it.dryRun ? ' <span class="tag ms">dry-run</span>' : ""}` +
      (it.config ? `<div class="cfg">${esc(JSON.stringify(it.config))}</div>` : "") + `</div><div class="arrow">↓</div>`;
  }
  html += `<div class="chip" style="border-color:var(--ok)"><b>provider: ${esc(p.provider || "?")}</b></div><div class="arrow">response ↑ (post-hooks run in reverse)</div></div>`;
  $("#pipeline").innerHTML = html;
}

/* ---------- tabs & filters ---------- */
const TABS = { traces: null, sessions: loadSessions, dag: loadDag, stats: loadStats, pipeline: loadPipeline };
function showTab(name) {
  for (const tab of Object.keys(TABS)) {
    $("#tab-" + tab).classList.toggle("active", tab === name);
    if (tab !== "traces") $("#" + tab).style.display = tab === name ? "block" : "none";
  }
  $("#list").style.display = name === "traces" ? "flex" : "none";
  $("#detail").style.display = name === "traces" ? "block" : "none";
  if (TABS[name]) TABS[name]();
}
for (const tab of Object.keys(TABS)) $("#tab-" + tab).onclick = () => showTab(tab);
$("#q").oninput = renderList; $("#fstatus").onchange = renderList;
boot();
