[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "gavio"
version = "1.1.0"
description = "AI request runtime and inspector for production systems — PII protection, audit trails, runtime events, reliability, cost intelligence, policy packs, and tool runtime checks as composable interceptors."
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
authors = [{ name = "Manoj Mallick" }]
keywords = [
    "llm", "ai", "ai-gateway", "llm-gateway", "llmops", "gateway",
    "pii", "pii-redaction", "audit", "observability", "reliability",
    "cost-tracking", "interceptor", "openai", "anthropic",
]
classifiers = [
    "Development Status :: 5 - Production/Stable",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Typing :: Typed",
]
# Core has zero mandatory runtime dependencies.
dependencies = []

[project.optional-dependencies]
presidio = ["presidio-analyzer", "spacy"]
redis = ["redis"]
otel = ["opentelemetry-sdk", "opentelemetry-exporter-otlp"]
elasticsearch = ["elasticsearch"]
pgvector = ["psycopg2", "pgvector"]
ocr = ["pytesseract", "pillow"]
dev = ["pytest>=7.0", "pytest-asyncio>=0.21", "ruff>=0.4", "mypy>=1.8"]
all = [
    "presidio-analyzer", "spacy", "redis",
    "opentelemetry-sdk", "opentelemetry-exporter-otlp",
    "elasticsearch", "psycopg2", "pgvector", "pytesseract", "pillow",
]

[project.scripts]
gavio = "gavio.cli:main"

[project.urls]
Homepage = "https://manojmallick.github.io/gavio"
Repository = "https://github.com/manojmallick/gavio"
Changelog = "https://github.com/manojmallick/gavio/blob/main/CHANGELOG.md"
Issues = "https://github.com/manojmallick/gavio/issues"

[tool.hatch.build.targets.wheel]
packages = ["gavio"]

[tool.ruff]
line-length = 100
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "W"]
ignore = ["B008"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

[tool.mypy]
python_version = "3.10"
strict = true
